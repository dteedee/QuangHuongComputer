# ============================================
# Quang Huong Computer - Frontend Nginx Config
# Serves SPA (React/Vite) with production optimisations
# ============================================

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Gzip Compression ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml
        font/woff2;

    # ---- Static Assets (Vite hashed filenames → immutable cache) ----
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon & manifest
    location ~* \.(ico|png|webmanifest)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ---- SPA Fallback ----
    location / {
        try_files $uri $uri/ /index.html;

        # Do NOT cache index.html
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # ---- Error Pages ----
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # ---- Block dot-files (.env, .git, etc.) ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
